name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python and Dependencies
        run: |
          uv python install
          uv sync --all-extras --dev

      - name: Run Pytest
        run: uv run pytest

      - name: Run Behave
        run: uv run behave --format plain --no-capture